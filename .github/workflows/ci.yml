name: CI

on:
  push:
    branches:
      - main
      - feature/**
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  UNICODE_TEST_VERSIONS: "15.1.0 16.0.0 17.0.0"

jobs:
  msvc:
    name: MSVC (${{ matrix.configuration }}, C++23)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
          - configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build and run tests for all Unicode versions
        shell: powershell
        run: |
          foreach ($version in ($env:UNICODE_TEST_VERSIONS -split ' ' | Where-Object { $_ -ne '' }))
          {
            ./tools/update_unicode_data.ps1 -Version $version
            ./tools/regenerate_unicode_tables.ps1 -DataRoot (Join-Path $PWD "tools/unicode_data/$version") -UnicodeVersion $version
            msbuild unicode_ranges.vcxproj "/t:Clean;Build" /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /p:PlatformToolset=v143 /p:TreatWarningAsError=true
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .\x64\${{ matrix.configuration }}\unicode_ranges.exe
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

  clang_cl:
    name: Clang-cl (${{ matrix.configuration }}, C++23)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
          - configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build and run tests for all Unicode versions
        shell: powershell
        run: |
          foreach ($version in ($env:UNICODE_TEST_VERSIONS -split ' ' | Where-Object { $_ -ne '' }))
          {
            ./tools/update_unicode_data.ps1 -Version $version
            ./tools/regenerate_unicode_tables.ps1 -DataRoot (Join-Path $PWD "tools/unicode_data/$version") -UnicodeVersion $version
            msbuild unicode_ranges.vcxproj "/t:Clean;Build" /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /p:PlatformToolset=ClangCL /p:TreatWarningAsError=true
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            .\x64\${{ matrix.configuration }}\unicode_ranges.exe
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

  macos:
    name: macOS (AppleClang, O2, C++23)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show compiler versions
        run: |
          clang++ --version
          rustc --version
          pwsh --version

      - name: Build and run tests for all Unicode versions
        run: |
          for version in $UNICODE_TEST_VERSIONS; do
            pwsh ./tools/update_unicode_data.ps1 -Version "$version"
            pwsh ./tools/regenerate_unicode_tables.ps1 -DataRoot "$(pwd)/tools/unicode_data/$version" -UnicodeVersion "$version"
            output="unicode_ranges_macos_o2_${version//./_}"
            clang++ -std=c++23 -O2 -Wall -Wextra -Werror -pedantic -pthread source.cpp -o "$output"
            "./$output"
          done

  static_analysis:
    name: Static analysis (MSVC /analyze)
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run static analysis
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\tools\run_static_analysis.ps1 -Project unicode_ranges.vcxproj -PlatformToolset v143

  linux:
    name: ${{ matrix.name }} (${{ matrix.opt_name }}${{ matrix.sanitizer_name }}, C++23)
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.install_kind == 'clang' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_o0
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_o2
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_o3
            opt_name: O3
            opt_flags: "-O3"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_o0_san
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_o2_san
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_o3_san
            opt_name: O3
            opt_flags: "-O3"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output: unicode_ranges_clang_o0
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output: unicode_ranges_clang_o2
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output: unicode_ranges_clang_o0_san
            opt_name: O0
            opt_flags: "-O0"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output: unicode_ranges_clang_o2_san
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
          - name: Clang trunk (libc++ ABI unstable)
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread -D_LIBCPP_ABI_UNSTABLE"
            output: unicode_ranges_clang_o2_san_abi_unstable
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", ASan+UBSan"
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=1"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
          - name: Clang trunk (TSan)
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output: unicode_ranges_clang_o2_tsan
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", TSan"
            sanitizer_flags: "-fsanitize=thread -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: ""
            ubsan_options: ""
            tsan_options: "halt_on_error=1"
          - name: GCC (old ABI)
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread -D_GLIBCXX_USE_CXX11_ABI=0"
            output: unicode_ranges_gcc_o2_oldabi
            opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ""
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: |
          ${{ matrix.cxx }} --version
          rustc --version
          pwsh --version

      - name: Build and run tests for all Unicode versions
        run: |
          for version in $UNICODE_TEST_VERSIONS; do
            pwsh ./tools/update_unicode_data.ps1 -Version "$version"
            pwsh ./tools/regenerate_unicode_tables.ps1 -DataRoot "$(pwd)/tools/unicode_data/$version" -UnicodeVersion "$version"
            output="${{ matrix.output }}_${version//./_}"
            ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} ${{ matrix.sanitizer_flags }} -DUTF8_RANGES_ENABLE_TEST_HOOKS=1 source.cpp -o "$output"
            "./$output"
            if [ -n "${{ matrix.sanitizer_flags }}" ]; then
              forced_output="${output}_forced_parallel"
              ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} ${{ matrix.sanitizer_flags }} -DUTF8_RANGES_ENABLE_TEST_HOOKS=1 -DUTF8_RANGES_TEST_FORCE_UTF32_PARALLEL=1 source.cpp -o "$forced_output"
              "./$forced_output"
            fi
            if [ "${{ matrix.sanitizer_name }}" = ", TSan" ]; then
              forced_output="${output}_forced_parallel"
              ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} ${{ matrix.sanitizer_flags }} -DUTF8_RANGES_ENABLE_TEST_HOOKS=1 -DUTF8_RANGES_TEST_FORCE_UTF32_PARALLEL=1 source.cpp -o "$forced_output"
              "./$forced_output"
            fi
          done
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
          TSAN_OPTIONS: ${{ matrix.tsan_options }}

  linux_32:
    name: Linux x86 GCC (${{ matrix.opt_name }}${{ matrix.sanitizer_name }}, C++23)
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.sanitized }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ""
            sanitized: false
            sanitizer_flags: ""
            asan_options: ""
            ubsan_options: ""
            tsan_options: ""
            output: unicode_ranges_gcc_x86_o2
          - opt_name: O2
            opt_flags: "-O2"
            sanitizer_name: ", ASan+UBSan"
            sanitized: true
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            asan_options: "detect_leaks=0"
            ubsan_options: "print_stacktrace=1"
            tsan_options: ""
            output: unicode_ranges_gcc_x86_o2_san

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GCC multilib toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y g++-14 g++-14-multilib libc6-dev-i386

      - name: Show compiler version
        run: |
          g++-14 --version
          rustc --version
          pwsh --version

      - name: Build and run tests for all Unicode versions
        run: |
          for version in $UNICODE_TEST_VERSIONS; do
            pwsh ./tools/update_unicode_data.ps1 -Version "$version"
            pwsh ./tools/regenerate_unicode_tables.ps1 -DataRoot "$(pwd)/tools/unicode_data/$version" -UnicodeVersion "$version"
            output="${{ matrix.output }}_${version//./_}"
            g++-14 -m32 -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic -pthread ${{ matrix.sanitizer_flags }} -DUTF8_RANGES_ENABLE_TEST_HOOKS=1 source.cpp -o "$output"
            "./$output"
            if [ -n "${{ matrix.sanitizer_flags }}" ]; then
              forced_output="${output}_forced_parallel"
              g++-14 -m32 -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic -pthread ${{ matrix.sanitizer_flags }} -DUTF8_RANGES_ENABLE_TEST_HOOKS=1 -DUTF8_RANGES_TEST_FORCE_UTF32_PARALLEL=1 source.cpp -o "$forced_output"
              "./$forced_output"
            fi
          done
        env:
          ASAN_OPTIONS: ${{ matrix.asan_options }}
          UBSAN_OPTIONS: ${{ matrix.ubsan_options }}
          TSAN_OPTIONS: ${{ matrix.tsan_options }}

  linux_icu:
    name: ${{ matrix.name }} + ICU (O2, C++23)
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.install_kind == 'clang' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            install_kind: gcc
            packages: g++-14 libicu-dev pkg-config
            cxx: g++-14
            cxxflags: "-pthread"
            output: unicode_ranges_gcc_icu
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev libicu-dev pkg-config
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output: unicode_ranges_clang_icu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install GCC and ICU
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk and ICU
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show tool versions
        run: |
          ${{ matrix.cxx }} --version
          rustc --version
          pwsh --version
          pkg-config --modversion icu-uc

      - name: Build and run ICU-enabled tests for all Unicode versions
        run: |
          for version in $UNICODE_TEST_VERSIONS; do
            pwsh ./tools/update_unicode_data.ps1 -Version "$version"
            pwsh ./tools/regenerate_unicode_tables.ps1 -DataRoot "$(pwd)/tools/unicode_data/$version" -UnicodeVersion "$version"
            output="${{ matrix.output }}_${version//./_}"
            ${{ matrix.cxx }} -std=c++23 -O2 -Wall -Wextra -Werror -pedantic \
              -DUTF8_RANGES_ENABLE_ICU=1 \
              ${{ matrix.cxxflags }} \
              $(pkg-config --cflags icu-uc) \
              source.cpp \
              -o "$output" \
              $(pkg-config --libs icu-uc)
            "./$output"
          done

  docs_examples:
    name: Docs examples (${{ matrix.name }}, C++23)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            output_dir: build/docs-examples-gcc
          - name: Clang trunk
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            output_dir: build/docs-examples-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: |
          ${{ matrix.cxx }} --version

      - name: Compile docs examples
        id: compile_docs_examples
        continue-on-error: ${{ matrix.install_kind == 'gcc' }}
        run: bash tools/compile_docs_examples.sh ${{ matrix.cxx }} ${{ matrix.output_dir }} -O0 -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }}

      - name: Note GCC docs-example formatting limitation
        if: steps.compile_docs_examples.outcome == 'failure' && matrix.install_kind == 'gcc'
        run: |
          {
            echo "## Docs examples (GCC)"
            echo
            echo "libstdc++ 14 does not currently support direct \`std::print\` / \`std::format\` formatting for these custom range views."
            echo "The GCC docs-example job is therefore informational and non-blocking."
          } >> "$GITHUB_STEP_SUMMARY"

  coverage:
    name: Coverage (Clang, libc++, C++23)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clang coverage toolchain
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 llvm-22 llvm-22-tools libc++-22-dev libc++abi-22-dev

      - name: Show tool versions
        run: |
          clang++-22 --version
          llvm-cov-22 --version
          llvm-profdata-22 --version

      - name: Generate coverage
        run: bash tools/generate_coverage.sh

      - name: Publish coverage summary
        run: |
          {
            echo "## Coverage"
            echo
            echo '```text'
            cat coverage/summary.txt
            echo '```'
            echo
            echo "Full function-level coverage is available in the \`coverage-report\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  required:
    name: Required CI
    if: github.event_name == 'pull_request'
    needs:
      - msvc
      - clang_cl
      - macos
      - linux
      - linux_32
      - linux_icu
      - docs_examples
      - coverage
      - comparative_benchmarks
    runs-on: ubuntu-24.04

    steps:
      - name: Verify required jobs
        run: |
          echo "All required CI jobs passed."

  benchmarks:
    name: Benchmark (${{ matrix.name }}, ${{ matrix.opt_name }}, C++23)
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            runs_on: ubuntu-24.04
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            opt_name: O3
            opt_flags: "-O3 -DNDEBUG"
            output: unicode_ranges_benchmarks_gcc_o3
            artifact_name: benchmark-gcc-o3
          - name: Clang trunk
            runs_on: ubuntu-24.04
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            opt_name: O2
            opt_flags: "-O2 -DNDEBUG"
            output: unicode_ranges_benchmarks_clang_o2
            artifact_name: benchmark-clang-o2
          - name: GCC x86
            runs_on: ubuntu-24.04
            install_kind: gcc32
            packages: g++-14 g++-14-multilib libc6-dev-i386
            cxx: g++-14
            cxxflags: "-m32 -pthread"
            opt_name: O3
            opt_flags: "-O3 -DNDEBUG"
            output: unicode_ranges_benchmarks_gcc_x86_o3
            artifact_name: benchmark-gcc-x86-o3
          - name: AppleClang
            runs_on: macos-latest
            install_kind: appleclang
            packages: ""
            cxx: clang++
            cxxflags: "-pthread"
            opt_name: O2
            opt_flags: "-O2 -DNDEBUG"
            output: unicode_ranges_benchmarks_macos_o2
            artifact_name: benchmark-macos-o2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install GCC multilib
        if: matrix.install_kind == 'gcc32'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Show compiler version
        run: ${{ matrix.cxx }} --version

      - name: Build benchmark runner
        run: ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} unicode_ranges_benchmarks.cpp -o ${{ matrix.output }}

      - name: Run benchmark suite
        run: ./${{ matrix.output }} --min-ms=300 > benchmark-results.txt

      - name: Publish benchmark summary
        run: |
          {
            echo "## Benchmarks (${{ matrix.name }}, ${{ matrix.opt_name }})"
            echo
            echo "_Shared CI runners are noisy; treat these as directional numbers._"
            echo
            echo '```text'
            cat benchmark-results.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: benchmark-results.txt

  comparative_benchmarks:
    name: Comparative benchmarks (${{ matrix.name }}, ${{ matrix.opt_name || matrix.configuration }}, C++23)
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC
            runs_on: ubuntu-24.04
            install_kind: gcc
            packages: g++-14
            cxx: g++-14
            cxxflags: "-pthread"
            opt_name: O3
            opt_flags: "-O3 -DNDEBUG"
            output: comparative_benchmarks_gcc_o3
          - name: Clang trunk
            runs_on: ubuntu-24.04
            install_kind: clang
            packages: clang-22 libc++-22-dev libc++abi-22-dev
            cxx: clang++-22
            cxxflags: "-stdlib=libc++ -pthread"
            opt_name: O2
            opt_flags: "-O2 -DNDEBUG"
            output: comparative_benchmarks_clang_o2
          - name: MSVC
            runs_on: windows-latest
            install_kind: msvc
            configuration: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC
        if: matrix.install_kind == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Clang trunk
        if: matrix.install_kind == 'clang'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Setup MSBuild
        if: matrix.install_kind == 'msvc'
        uses: microsoft/setup-msbuild@v2

      - name: Fetch comparative dependencies
        if: matrix.install_kind != 'msvc'
        run: |
          deps_root="$(pwd)/build/comparative-deps"
          simdutf_root="$(pwsh -NoProfile -File ./tools/fetch_comparative_dependency.ps1 -Name simdutf -DestinationRoot "$deps_root")"
          utfcpp_root="$(pwsh -NoProfile -File ./tools/fetch_comparative_dependency.ps1 -Name utfcpp -DestinationRoot "$deps_root")"
          echo "SIMDUTF_ROOT=$simdutf_root" >> "$GITHUB_ENV"
          echo "UTFCPP_ROOT=$utfcpp_root" >> "$GITHUB_ENV"

      - name: Fetch comparative dependencies (MSVC)
        if: matrix.install_kind == 'msvc'
        shell: powershell
        run: |
          $depsRoot = Join-Path $PWD "build/comparative-deps"
          $simdutfRoot = .\tools\fetch_comparative_dependency.ps1 -Name simdutf -DestinationRoot $depsRoot
          $utfcppRoot = .\tools\fetch_comparative_dependency.ps1 -Name utfcpp -DestinationRoot $depsRoot
          "SIMDUTF_ROOT=$simdutfRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "UTFCPP_ROOT=$utfcppRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show fetched comparative dependency versions
        shell: pwsh
        run: |
          $depsRoot = Join-Path $PWD "build/comparative-deps"
          $stamps = @(Get-ChildItem -LiteralPath $depsRoot -Recurse -Filter ".utf8_ranges_dependency.json" -ErrorAction SilentlyContinue)
          if ($stamps.Length -eq 0) {
            Write-Host "Fetched comparative dependencies: none"
            if ($env:GITHUB_STEP_SUMMARY) {
              @(
                "## Comparative dependencies"
                ""
                "No comparative dependencies were fetched."
              ) -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }
            exit 0
          }

          $summaryLines = @("## Comparative dependencies", "")
          Write-Host "Fetched comparative dependencies:"
          foreach ($stampPath in $stamps | Sort-Object FullName) {
            $stamp = Get-Content -LiteralPath $stampPath.FullName -Raw | ConvertFrom-Json
            $line = " - $($stamp.name) $($stamp.version)"
            Write-Host $line
            $summaryLines += $line
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            $summaryLines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Show compiler version
        if: matrix.install_kind != 'msvc'
        run: ${{ matrix.cxx }} --version

      - name: Build comparative benchmark runner
        if: matrix.install_kind != 'msvc'
        run: |
          ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} -Wall -Wextra -Werror -pedantic ${{ matrix.cxxflags }} -DUTF8_RANGES_COMPARATIVE_WITH_SIMDUTF=1 -DUTF8_RANGES_COMPARATIVE_WITH_UTFCPP=1 -I"${SIMDUTF_ROOT}" -I"${UTFCPP_ROOT}/source" -c comparative_benchmarks.cpp -o comparative_benchmarks.o
          ${{ matrix.cxx }} -std=c++23 ${{ matrix.opt_flags }} ${{ matrix.cxxflags }} -DUTF8_RANGES_COMPARATIVE_WITH_SIMDUTF=1 -I"${SIMDUTF_ROOT}" -Wno-error=overflow -Wno-error=pedantic -c comparative_benchmarks/third_party/simdutf_amalgamation.cpp -o simdutf_amalgamation.o
          ${{ matrix.cxx }} comparative_benchmarks.o simdutf_amalgamation.o ${{ matrix.cxxflags }} -o ${{ matrix.output }}

      - name: Run comparative benchmark suite
        if: matrix.install_kind != 'msvc'
        run: ./${{ matrix.output }} --quick > comparative-benchmark-results.txt

      - name: Build comparative benchmark runner (MSVC)
        if: matrix.install_kind == 'msvc'
        shell: powershell
        run: |
          msbuild comparative_benchmarks.vcxproj "/t:Clean;Build" /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /p:PlatformToolset=v143 /p:TreatWarningAsError=true
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run comparative benchmark suite (MSVC)
        if: matrix.install_kind == 'msvc'
        shell: powershell
        run: |
          .\x64\${{ matrix.configuration }}\comparative_benchmarks.exe --quick | Out-File -FilePath comparative-benchmark-results.txt -Encoding utf8
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish comparative benchmark summary
        shell: pwsh
        run: |
          $summaryLines = @(
            "## Comparative benchmarks (${{ matrix.name }}, ${{ matrix.opt_name || matrix.configuration }})"
            ""
            "_Current baselines: unicode_ranges, simdutf (v7.7.0), and utfcpp (v4.0.9)._"
            "_Unsupported rows are reported explicitly when a library or public API surface does not cover the benchmark contract._"
            ""
            '```text'
          )

          if (Test-Path -LiteralPath comparative-benchmark-results.txt) {
            $summaryLines += Get-Content -LiteralPath comparative-benchmark-results.txt
          } else {
            $summaryLines += "comparative-benchmark-results.txt was not generated."
          }

          $summaryLines += '```'

          if ($env:GITHUB_STEP_SUMMARY) {
            $summaryLines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
